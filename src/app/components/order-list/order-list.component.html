<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    
    <!-- Estilos e fontes -->
    <link rel="stylesheet" href="./order-list.component.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" />

    <title>Pedidos Recebidos</title>
</head>
<body>
    <section class="cozinha-pedidos">
        <header>
            <h1 class="pedidos-recebidos">Pedidos recebidos</h1>
            <b class="data-pedidos" id="dataPedidos">Hoje, </b>
        </header>

        <!-- Lista de pedidos -->
        <div class="pedido-lista">
            <article class="pedido">
                <div class="pedido-header">
                    <b class="pedido-nome">Lucas</b>
                    <input type="checkbox" class="checkbox" checked>
                </div>
                <ul class="itens-do-pedido">
                    <li>Hambúrguer</li>
                    <li>Coca Cola</li>
                    <li>Açaí Grande</li>
                </ul>
            </article>

            <article class="pedido">
                <div class="pedido-header">
                    <b class="pedido-nome">Gabriel</b>
                    <input type="checkbox" class="checkbox">
                </div>
                <ul class="itens-do-pedido">
                    <li>Hambúrguer</li>
                    <li>Coca Cola</li>
                    <li>Açaí Grande</li>
                </ul>
            </article>

            <article class="pedido">
                <div class="pedido-header">
                    <b class="pedido-nome">Enio</b>
                    <input type="checkbox" class="checkbox" checked>
                </div>
                <ul class="itens-do-pedido">
                    <li>Hambúrguer</li>
                    <li>Coca Cola</li>
                    <li>Açaí Grande</li>
                </ul>
            </article>
        </div>

        <button class="btn-aceitar-pedido">Aceitar pedido</button>
    </section>
    <script>
        // Função para exibir a data atual
        function mostrarDataAtual() {
            const dataElement = document.getElementById("dataPedidos");
            const dataAtual = new Date();

            const dia = String(dataAtual.getDate()).padStart(2, '0');
            const mes = String(dataAtual.getMonth() + 1).padStart(2, '0'); // Mês começa do zero
            const ano = dataAtual.getFullYear();

            // Formatar a data como: Hoje, DD/MM/AAAA
            const dataFormatada = `Hoje, ${dia}/${mes}/${ano}`;
            dataElement.textContent = dataFormatada;
        }

        // Chamar a função para exibir a data no carregamento da página
        mostrarDataAtual();
    </script>
</body>
</html>
